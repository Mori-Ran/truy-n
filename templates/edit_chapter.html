<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chỉnh sửa chapter - {{ story.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body class="{{ 'admin-active' if is_admin else 'guest-active' }}">
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>
    <main class="post-page">
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="eyebrow">✏️ Edit chapter</p>
            <h2>{{ story.title }}</h2>
          </div>
          <a href="{{ url_for('index') }}" class="btn btn--ghost">← Quay về home</a>
        </div>
        <form class="upload-form" action="{{ url_for('edit_chapter', story_id=story.id, chapter_index=chapter_index) }}" method="post">
          <div class="form-grid">
            <label class="full">
              <span>Chapter title</span>
              <input type="text" name="chapter_title" value="{{ chapter.title }}" required />
            </label>
            <label class="full">
              <span>Chapter content</span>
              <textarea rows="10" name="chapter_content" required>{{ chapter.content }}</textarea>
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn--primary">💾 Lưu thay đổi</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
